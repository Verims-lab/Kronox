name: Apply Architecture Audit Fix Pack 1

on:
  push:
    branches:
      - main
    paths:
      - '.codex/apply-audit-fix-pack-1.patch'

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply audit fix patch
        shell: bash
        run: |
          set -euo pipefail
          git apply .codex/apply-audit-fix-pack-1.patch
          git rm .codex/apply-audit-fix-pack-1.patch .github/workflows/apply-audit-fix-pack-1.yml
          git config user.name "codex-app[bot]"
          git config user.email "codex-app[bot]@users.noreply.github.com"
          git add base44/functions/runTestSuite/entry.ts base44/functions/simulateOnlineGame/entry.ts src/components/dev/BuildMarker.jsx src/components/game/QuestionCard.jsx src/hooks/useGameActions.js src/hooks/useLobbySync.js src/lib/admin.js src/lib/debugLog.js src/pages/Game.jsx src/pages/LobbyRoom.jsx src/pages/SettingsPage.jsx src/pages/TestSuite.jsx
          git commit -m "Apply architecture audit fix pack 1"
          git push origin HEAD:main
