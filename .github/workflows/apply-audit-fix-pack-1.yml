name: Apply Architecture Audit Fix Pack 1

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/apply-audit-fix-pack-1.yml'

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply patch and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git apply <<'PATCH'
