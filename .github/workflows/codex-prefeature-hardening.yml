name: Codex Apply Prefeature Hardening

on:
  push:
    branches:
      - Codex

permissions:
  contents: write

jobs:
  apply-prefeature-hardening:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Codex
          token: ${{ secrets.GITHUB_TOKEN }}
