name: Apply QA Failing Tests Fix

on:
  push:
    branches:
      - Codex
    paths:
      - '.codex/qa-failing-tests-fix.patch'

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply QA test patch
        shell: bash
        run: |
          set -euo pipefail
          git apply .codex/qa-failing-tests-fix.patch
          git rm .codex/qa-failing-tests-fix.patch .github/workflows/apply-qa-failing-tests-fix.yml
          git config user.name "codex-app[bot]"
          git config user.email "codex-app[bot]@users.noreply.github.com"
          git add src/components/game/SimulationPanel.jsx
          git commit -m "Fix QA failing test contracts"
          git push origin HEAD:Codex
