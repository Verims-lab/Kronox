name: Apply Game Rules Fix Pack 2

on:
  push:
    branches:
      - Codex
    paths:
      - '.codex/game-rules-fix-pack-2.patch'
      - '.github/workflows/apply-game-rules-fix-pack-2.yml'

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply game rules refactor patch
        shell: bash
        run: |
          set -euo pipefail
          git apply .codex/game-rules-fix-pack-2.patch
          git rm .codex/game-rules-fix-pack-2.patch .github/workflows/apply-game-rules-fix-pack-2.yml
          git config user.name "codex-app[bot]"
          git config user.email "codex-app[bot]@users.noreply.github.com"
          git add src/lib/gameRules.js src/hooks/useGameActions.js src/components/game/SimulationPanel.jsx src/components/dev/BuildMarker.jsx
          git commit -m "Extract pure gameplay rule helpers"
          git push origin HEAD:Codex
