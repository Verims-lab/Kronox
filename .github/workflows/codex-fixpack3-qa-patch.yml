name: Codex Apply Fix Pack 3 QA Patch

on:
  push:
    branches:
      - Codex

permissions:
  contents: write

jobs:
  apply-qa-patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Codex
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply SimulationPanel lobby split coverage
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'src/components/game/SimulationPanel.jsx';
          let source = fs.readFileSync(path, 'utf8');
          const replace = (from, to, label) => {
            if (!source.includes(from)) {
              console.error(`Missing replacement anchor: ${label}`);
              process.exit(1);
            }
            source = source.replace(from, to);
          };

          replace(
            "import lobbyRoomSource from '../../pages/LobbyRoom.jsx?raw';\n",
            "import lobbyRoomSource from '../../pages/LobbyRoom.jsx?raw';\nimport lobbyCreateJoinPanelSource from '../lobby/LobbyCreateJoinPanel.jsx?raw';\nimport waitingRoomPanelSource from '../lobby/WaitingRoomPanel.jsx?raw';\n",
            'lobby panel raw imports'
          );
          replace(
            "import tutorialSource from '../tutorial/KronoxTutorial.jsx?raw';\n",
            "import tutorialSource from '../tutorial/KronoxTutorial.jsx?raw';\nimport useLobbyRoomStateSource from '../../hooks/useLobbyRoomState.js?raw';\nimport useWaitingRoomSyncSource from '../../hooks/useWaitingRoomSync.js?raw';\n",
            'lobby hook raw imports'
          );
          replace(
            "import gameRulesSource from '../../lib/gameRules.js?raw';\n",
            "import gameRulesSource from '../../lib/gameRules.js?raw';\nimport lobbyUtilsSource from '../../lib/lobbyUtils.js?raw';\n",
            'lobby utils raw import'
          );
          replace(
            "const SRC = { App: appSource, MainMenu: mainMenuSource, SoloChallenge: soloChallengeSource, GameLayout: gameLayoutSource, Game: gamePageSource, LobbyRoom: lobbyRoomSource, Settings: settingsPageSource, QuestionCard: questionCardSource, TimelineCard: timelineCardSource, GameOver: gameOverSource, QuestionManagement: questionManagementSource, Tutorial: tutorialSource, LobbySync: lobbySyncSource, GameRules: gameRulesSource, UpdateLobbyGameState: updateLobbyGameStateSource, BuildMarker: buildMarkerSource, Kronox: kronoxDocSource, Core: corePromptSource };",
            "const SRC = { App: appSource, MainMenu: mainMenuSource, SoloChallenge: soloChallengeSource, GameLayout: gameLayoutSource, Game: gamePageSource, LobbyRoom: lobbyRoomSource, LobbyCreateJoinPanel: lobbyCreateJoinPanelSource, WaitingRoomPanel: waitingRoomPanelSource, Settings: settingsPageSource, QuestionCard: questionCardSource, TimelineCard: timelineCardSource, GameOver: gameOverSource, QuestionManagement: questionManagementSource, Tutorial: tutorialSource, LobbyRoomState: useLobbyRoomStateSource, WaitingRoomSync: useWaitingRoomSyncSource, LobbySync: lobbySyncSource, GameRules: gameRulesSource, LobbyUtils: lobbyUtilsSource, UpdateLobbyGameState: updateLobbyGameStateSource, BuildMarker: buildMarkerSource, Kronox: kronoxDocSource, Core: corePromptSource };",
            'SRC map'
          );
          replace(
            "sourceLacks('regression', 'no_chat_button', 'no removed chat button visible', 'online sources', `${SRC.GameLayout}\\n${SRC.Game}\\n${SRC.LobbyRoom}`, ['MessageCircle', 'unreadCount']),",
            "sourceLacks('regression', 'no_chat_button', 'no removed chat button visible', 'online sources', `${SRC.GameLayout}\\n${SRC.Game}\\n${SRC.LobbyRoom}\\n${SRC.WaitingRoomPanel}\\n${SRC.LobbyCreateJoinPanel}`, ['MessageCircle', 'unreadCount']),",
            'regression chat sources'
          );
          replace(
            "sourceHas('architecture', 'server_update_validation_layer', 'updateLobbyGameState has server-side validation layer', 'updateLobbyGameState/entry.ts', SRC.UpdateLobbyGameState, ['validateGameStateUpdate', 'VALID_STATUSES', 'containsAllPreviousIds', 'getNextPlayerIndex', 'winnerIndex']),",
            "sourceHas('architecture', 'server_update_validation_layer', 'updateLobbyGameState has server-side validation layer', 'updateLobbyGameState/entry.ts', SRC.UpdateLobbyGameState, ['validateGameStateUpdate', 'VALID_STATUSES', 'containsAllPreviousIds', 'getNextPlayerIndex', 'winnerIndex']),\n  sourceHas('architecture', 'lobby_room_thin_orchestrator', 'LobbyRoom is split into smaller lobby modules', 'LobbyRoom.jsx', SRC.LobbyRoom, ['<LobbyCreateJoinPanel', '<WaitingRoomPanel', 'useLobbyRoomState', '@/lib/lobbyUtils']),\n  sourceHas('architecture', 'lobby_utils_extracted', 'Lobby pure helpers are extracted', 'lobbyUtils.js', SRC.LobbyUtils, ['export function normalizeCode', 'export function summarizePlayers', 'export function isHost', 'export function canJoinLobby', 'export function buildPlayerPayload', 'export function buildLobbyStartPayload']),\n  sourceHas('architecture', 'lobby_state_hook_extracted', 'Lobby identity and page state live in useLobbyRoomState', 'useLobbyRoomState.js', SRC.LobbyRoomState, ['base44.auth.me', 'setPlayerName', 'setLobby', 'setLoading', 'setNameError']),\n  sourceHas('architecture', 'waiting_room_sync_hook_extracted', 'Waiting-room subscription and polling live in useWaitingRoomSync', 'useWaitingRoomSync.js', SRC.WaitingRoomSync, ['base44.entities.Lobby.subscribe', 'window.setInterval', 'window.clearInterval', 'findLobbyByCode', \"navigate('/game'\"]),\n  sourceHas('architecture', 'lobby_panels_extracted', 'Lobby create/join and waiting-room panels are extracted', 'lobby panels', `${SRC.LobbyCreateJoinPanel}\\n${SRC.WaitingRoomPanel}`, ['export default function LobbyCreateJoinPanel', 'export default function WaitingRoomPanel', 'OYUNU BAŞLAT', 'LOBİ OLUŞTUR']),",
            'architecture tests'
          );
          replace(
            "sourceLacks('home', 'no_global_overflow_lock', 'global overflow hidden is not applied to all pages', 'App/Settings/Game/Lobby/Solo', `${SRC.App}\\n${SRC.Settings}\\n${SRC.LobbyRoom}\\n${SRC.SoloChallenge}`, ['document.body.style.overflow', 'overflow: hidden']),",
            "sourceLacks('home', 'no_global_overflow_lock', 'global overflow hidden is not applied to all pages', 'App/Settings/Game/Lobby/Solo', `${SRC.App}\\n${SRC.Settings}\\n${SRC.LobbyRoom}\\n${SRC.WaitingRoomPanel}\\n${SRC.LobbyCreateJoinPanel}\\n${SRC.SoloChallenge}`, ['document.body.style.overflow', 'overflow: hidden']),",
            'home overflow sources'
          );
          replace(
            "sourceHas('lobby', 'non_host_in_game_transition', 'non-host transition supports in_game', 'LobbyRoom.jsx', SRC.LobbyRoom, ['status', 'in_game', 'navigate']),",
            "sourceHas('lobby', 'non_host_in_game_transition', 'non-host transition supports in_game', 'useWaitingRoomSync.js', SRC.WaitingRoomSync, ['status', 'in_game', 'navigate']),\n  sourceHas('lobby', 'subscription_cleanup_preserved', 'waiting-room subscription cleanup still exists', 'useWaitingRoomSync.js', SRC.WaitingRoomSync, ['const unsub = base44.entities.Lobby.subscribe', 'return () => unsub()']),\n  sourceHas('lobby', 'polling_fallback_preserved', 'waiting-room polling fallback still exists', 'useWaitingRoomSync.js', SRC.WaitingRoomSync, ['start fallback polling registered', 'window.setInterval', 'window.clearInterval(intervalId)', \"navigateToOnlineGame(fresh, 'poll')\"]),\n  sourceHas('lobby', 'host_leave_preserved', 'host leave behavior is still present', 'LobbyRoom.jsx', SRC.LobbyRoom, ['base44.entities.Lobby.delete', 'base44.entities.Lobby.update', 'players: lobby.players.filter']),",
            'lobby regression tests'
          );
          const oldChatSources = "`${SRC.GameLayout}\\n${SRC.Game}\\n${SRC.LobbyRoom}`";
          const newChatSources = "`${SRC.GameLayout}\\n${SRC.Game}\\n${SRC.LobbyRoom}\\n${SRC.WaitingRoomPanel}\\n${SRC.LobbyCreateJoinPanel}`";
          source = source.replaceAll(oldChatSources, newChatSources);
          fs.writeFileSync(path, source);
          NODE
      - name: Remove temporary workflow
        run: git rm .github/workflows/codex-fixpack3-qa-patch.yml
      - name: Commit QA panel patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/game/SimulationPanel.jsx
          git commit -m "Add lobby split QA coverage"
          git push origin HEAD:Codex
