name: Apply Online State Validation

on:
  push:
    branches:
      - Codex
    paths:
      - '.codex/online-state-validation.patch'
      - '.github/workflows/apply-online-state-validation.yml'

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply online state validation patch
        shell: bash
        run: |
          set -euo pipefail
          git apply .codex/online-state-validation.patch
          git rm .codex/online-state-validation.patch .github/workflows/apply-online-state-validation.yml
          git config user.name "codex-app[bot]"
          git config user.email "codex-app[bot]@users.noreply.github.com"
          git add base44/functions/updateLobbyGameState/entry.ts src/components/game/SimulationPanel.jsx src/components/dev/BuildMarker.jsx
          git commit -m "Harden online game state updates"
          git push origin HEAD:Codex
