name: Apply Test Suite Mobile Reporting

on:
  push:
    branches:
      - Codex
    paths:
      - '.codex/test-suite-mobile-reporting.patch'

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply mobile reporting patch
        shell: bash
        run: |
          set -euo pipefail
          git apply .codex/test-suite-mobile-reporting.patch
          git rm .codex/test-suite-mobile-reporting.patch .github/workflows/apply-test-suite-mobile-reporting.yml
          git config user.name "codex-app[bot]"
          git config user.email "codex-app[bot]@users.noreply.github.com"
          git add src/components/game/SimulationPanel.jsx src/components/dev/BuildMarker.jsx
          git commit -m "Improve mobile test suite reporting"
          git push origin HEAD:Codex
