<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://media.base44.com/images/public/69e753d5ab4c08a7c4287c25/56ee45626_Kronoxuygulamaikon.png" />
    <link rel="apple-touch-icon" href="https://media.base44.com/images/public/69e753d5ab4c08a7c4287c25/56ee45626_Kronoxuygulamaikon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1034A6" />
    <title>Kronox</title>
    <style>html,body{background-color:#1034A6;}</style>
    <script>
      (function() {
        // Force Parliament Blue as the splash/theme color — always, on every platform.
        var themeColor = '#1034A6';
        document.documentElement.style.backgroundColor = themeColor;
        document.body && (document.body.style.backgroundColor = themeColor);
        var metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) metaTheme.setAttribute('content', themeColor);

        function applyTheme() {
          document.documentElement.classList.add('dark');
        }
        applyTheme();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
